<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Monetize Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050712;
      --bg-secondary: #090d1d;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #9aa7bd;
      --soft: #cbd5e1;
      --violet: #ef4444;
      --blue: #b91c1c;
      --gold: #facc15;
      --red: #ef4444;
      --green: #22c55e;
      --font: Inter, system-ui, -apple-system, sans-serif;
      --gradient-primary: linear-gradient(135deg, var(--violet), var(--blue));
      --shadow-lg: 0 30px 90px rgba(0, 0, 0, 0.42);
      --shadow-glow: 0 0 20px rgba(239, 68, 68, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      padding: 40px 20px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background Blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.15;
      pointer-events: none;
    }
    body::before { top: -100px; right: -100px; background: var(--violet); }
    body::after { bottom: -100px; left: -100px; background: var(--blue); }

    .container { width: min(1200px, 100%); margin: 0 auto; position: relative; z-index: 1; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, var(--soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn-back {
      padding: 10px 24px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .btn-back:hover { background: var(--panel-hover); border-color: var(--soft); }

    /* Tabs - Segmented Control */
    .tabs {
      display: inline-flex;
      background: var(--bg-secondary);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid var(--border);
      gap: 4px;
      margin-bottom: 30px;
    }
    .tab {
      padding: 10px 20px;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }
    .tab.active {
      background: var(--gradient-primary);
      color: #fff;
      box-shadow: var(--shadow-glow);
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(25px);
      box-shadow: var(--shadow-lg);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: rgba(255, 255, 255, 0.02); transition: background 0.2s; }

    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      background: var(--violet);
      color: #fff;
    }
    .badge-platform {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-action {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 6px;
      transition: all 0.2s;
    }
    .btn-action:hover { background: var(--panel-hover); transform: translateY(-1px); }
    .btn-action.edit { color: var(--violet); border-color: rgba(239, 68, 68, 0.3); }
    .btn-action.delete { color: var(--red); border-color: rgba(239, 68, 68, 0.3); }

    .empty-state {
      padding: 80px;
      text-align: center;
      color: var(--muted);
      font-weight: 500;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: all 0.3s;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      width: min(550px, 92%);
      border-radius: 28px;
      padding: 32px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalAppear 0.3s ease-out;
    }
    @keyframes modalAppear {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: #fff;
      font-family: inherit;
      transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--violet);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 32px;
    }
    .btn-save {
      padding: 14px 28px;
      background: var(--gradient-primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover { transform: scale(1.03); filter: brightness(1.1); }
    .btn-cancel {
      padding: 14px 28px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-cancel:hover { color: var(--text); background: var(--panel); }

    .btn-add-account {
      margin-bottom: 24px;
      padding: 14px 28px;
      background: var(--gradient-primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-glow);
    }
    .btn-add-account:hover { transform: scale(1.03); filter: brightness(1.1); }

    .image-preview-container {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 8px;
    }
    .image-preview {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      object-fit: cover;
      display: none;
    }
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
      height: 100%;
      width: 100%;
    }
    .btn-upload {
      display: block;
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .btn-upload:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--muted);
      color: var(--text);
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 15px;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
      .btn-back {
        width: 100%;
        text-align: center;
      }
      .tabs {
        width: 100%;
        justify-content: center;
        overflow-x: auto;
      }
      .tab {
        flex-shrink: 0;
      }
      .table-wrap {
        overflow-x: auto;
      }
      th, td {
        padding: 14px 12px;
        font-size: 0.75rem;
      }
      .btn-action {
        display: inline-block;
        margin: 0 2px 5px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="pageTitle">Admin Dashboard</h1>
      <a href="monetizehub-dark-premium.html" class="btn-back">Retour au site</a>
    </header>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('leads')">Gestion des Leads</div>
      <div class="tab" onclick="switchTab('accounts')">Gestion des Comptes</div>
    </div>

    <!-- Section Leads -->
    <div id="leadsSection">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Email</th>
              <th>Source</th>
              <th>Page</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="leadsTable"></tbody>
        </table>
        <div id="leadsEmpty" class="empty-state" style="display: none;">Aucun lead trouvé.</div>
      </div>
    </div>

    <!-- Section Accounts -->
    <div id="accountsSection" style="display: none;">
      <button class="btn-add-account" onclick="openModal()">+ Ajouter un compte</button>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Plateforme</th>
              <th>Nom</th>
              <th>Prix</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="accountsTable"></tbody>
        </table>
        <div id="accountsEmpty" class="empty-state" style="display: none;">Aucun compte trouvé.</div>
      </div>
    </div>
  </div>

  <!-- Modal Form -->
  <div id="accountModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-bottom: 20px; font-weight: 800;">Ajouter un compte</h2>
      <form id="accountForm">
        <input type="hidden" id="accId">
        <div class="form-group">
          <label>Plateforme</label>
          <select id="platform">
            <option value="tiktok">TikTok</option>
            <option value="youtube">YouTube</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nom du compte</label>
          <input type="text" id="name" required placeholder="ex: TikTok Starter">
        </div>
        <div class="form-group">
          <label>Prix</label>
          <input type="text" id="price" required placeholder="ex: 50K FCFA">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Items (un par ligne)</label>
          <textarea id="meta_items" rows="4" placeholder="10K+ abonnés&#10;Monétisé"></textarea>
        </div>
        <div class="form-group">
          <label>Badge</label>
          <input type="text" id="badge" placeholder="Disponible">
        </div>
        <div class="form-group">
          <label>Image du compte</label>
          <div class="image-preview-container">
            <img id="imagePreview" class="image-preview" src="" alt="Prévisualisation">
            <div class="file-input-wrapper">
              <div class="btn-upload">Choisir une image...</div>
              <input type="file" id="imageFile" accept="image/*" onchange="handleImageUpload(this)">
            </div>
          </div>
          <input type="hidden" id="image_path" placeholder="hero.png">
        </div>
        <div class="form-group">
          <label>Lien de commande (Chariow)</label>
          <input type="url" id="purchase_link" placeholder="https://chariow.com/produit/...">
        </div>
        <div class="form-group">
          <label>Date d'expiration</label>
          <input type="date" id="expires_at">
        </div>
        <div class="form-group">
          <label>Disponibilité</label>
          <select id="is_available">
            <option value="1">Disponible</option>
            <option value="0">Indisponible</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
          <button type="submit" class="btn-save">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentTab = 'leads';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById('leadsSection').style.display = tab === 'leads' ? 'block' : 'none';
      document.getElementById('accountsSection').style.display = tab === 'accounts' ? 'block' : 'none';
      document.getElementById('pageTitle').innerText = tab === 'leads' ? 'Gestion des Leads' : 'Gestion des Comptes';

      if (tab === 'leads') loadLeads();
      else loadAccounts();
    }

    async function loadLeads() {
      const table = document.getElementById("leadsTable");
      const empty = document.getElementById("leadsEmpty");
      try {
        const response = await fetch("/api/popup-leads");
        const data = await response.json();
        if (!data.ok || data.leads.length === 0) {
          table.innerHTML = "";
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";
        table.innerHTML = data.leads.map(lead => `
          <tr>
            <td>${lead.id}</td>
            <td><strong>${lead.name}</strong></td>
            <td>${lead.email}</td>
            <td><span class="badge">${lead.source}</span></td>
            <td>${lead.page}</td>
            <td>${new Date(lead.created_at).toLocaleString()}</td>
          </tr>
        `).join("");
      } catch (e) { table.innerHTML = "<tr><td colspan='6' style='text-align:center; color:var(--red);'>Erreur.</td></tr>"; }
    }

    async function loadAccounts() {
      const table = document.getElementById("accountsTable");
      const empty = document.getElementById("accountsEmpty");
      try {
        const response = await fetch("/api/admin/accounts");
        const data = await response.json();
        if (!data.ok || data.accounts.length === 0) {
          table.innerHTML = "";
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";
        table.innerHTML = data.accounts.map(acc => `
          <tr>
            <td><span class="badge badge-platform">${acc.platform}</span></td>
            <td><strong>${acc.name}</strong></td>
            <td>${acc.price}</td>
            <td><span class="badge" style="background:${acc.is_available ? 'var(--green)' : 'var(--red)'}">${acc.is_available ? 'Actif' : 'Inactif'}</span></td>
            <td>
              <button class="btn-action edit" onclick="editAccount(${acc.id})">Modifier</button>
              <button class="btn-action delete" onclick="deleteAccount(${acc.id})">Supprimer</button>
            </td>
          </tr>
        `).join("");
      } catch (e) { table.innerHTML = "<tr><td colspan='5' style='text-align:center; color:var(--red);'>Erreur.</td></tr>"; }
    }

    function openModal(acc = null) {
      const modal = document.getElementById('accountModal');
      const form = document.getElementById('accountForm');
      document.getElementById('modalTitle').innerText = acc ? 'Modifier le compte' : 'Ajouter un compte';

      if (acc) {
        document.getElementById('accId').value = acc.id;
        document.getElementById('platform').value = acc.platform;
        document.getElementById('name').value = acc.name;
        document.getElementById('price').value = acc.price;
        document.getElementById('description').value = acc.description;
        document.getElementById('meta_items').value = JSON.parse(acc.meta_items || '[]').join('\n');
        document.getElementById('badge').value = acc.badge;
        document.getElementById('image_path').value = acc.image_path;
        document.getElementById('expires_at').value = acc.expires_at;
        document.getElementById('is_available').value = acc.is_available;
        document.getElementById('purchase_link').value = acc.purchase_link || '';

        // Set initial preview
        const preview = document.getElementById('imagePreview');
        preview.src = acc.image_path;
        preview.style.display = 'block';
      } else {
        form.reset();
        document.getElementById('accId').value = '';
        const preview = document.getElementById('imagePreview');
        preview.src = '';
        preview.style.display = 'none';
      }
      modal.classList.add('open');
    }

    async function handleImageUpload(input) {
      if (!input.files || !input.files[0]) return;

      const file = input.files[0];
      const formData = new FormData();
      formData.append('file', file);

      // Local preview
      const preview = document.getElementById('imagePreview');
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';

      try {
        const response = await fetch('/api/admin/upload', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();

        if (data.ok) {
          document.getElementById('image_path').value = data.path;
        } else {
          alert("Erreur lors de l'upload de l'image.");
        }
      } catch (e) {
        alert("Erreur de connexion au serveur.");
      }
    }

    function closeModal() {
      document.getElementById('accountModal').classList.remove('open');
    }

    async function editAccount(id) {
      const response = await fetch("/api/admin/accounts");
      const data = await response.json();
      const acc = data.accounts.find(a => a.id === id);
      openModal(acc);
    }

    async function deleteAccount(id) {
      if (!confirm("Supprimer ce compte définitivement ?")) return;
      const res = await fetch(`/api/admin/accounts/${id}`, { method: 'DELETE' });
      if (res.ok) loadAccounts();
    }

    document.getElementById('accountForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('accId').value;
      const body = {
        platform: document.getElementById('platform').value,
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        description: document.getElementById('description').value,
        meta_items: document.getElementById('meta_items').value.split('\n').filter(i => i.trim()),
        badge: document.getElementById('badge').value,
        image_path: document.getElementById('image_path').value,
        expires_at: document.getElementById('expires_at').value,
        is_available: parseInt(document.getElementById('is_available').value),
        purchase_link: document.getElementById('purchase_link').value
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `/api/admin/accounts/${id}` : '/api/admin/accounts';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        closeModal();
        loadAccounts();
      } else {
        alert("Erreur lors de l'enregistrement.");
      }
    };

    loadLeads();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Liste des chaines YouTube monetisees disponibles chez Monetize Hub.">
  <title>Comptes YouTube monetises - Monetize Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050712;
      --panel: rgba(255, 255, 255, 0.065);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #9aa7bd;
      --soft: #cbd5e1;
      --red: #ef4444;
      --primary-dark: #b91c1c;
      --green: #22c55e;
      --gold: #facc15;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      --font: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-width: 320px;
      background:
        radial-gradient(circle at 12% 0%, rgba(239, 68, 68, 0.22), transparent 28rem),
        radial-gradient(circle at 88% 4%, rgba(124, 58, 237, 0.30), transparent 30rem),
        linear-gradient(180deg, #050712 0%, #090d1d 55%, #050712 100%);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1180px, calc(100% - 40px)); margin: 0 auto; }
    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 18px 0;
      background: rgba(5, 7, 18, 0.76);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand { font-weight: 900; letter-spacing: 0.08em; }
    .back-link { color: var(--soft); font-weight: 800; }
    .hero { padding: 78px 0 44px; }
    .eyebrow {
      display: inline-flex;
      margin-bottom: 16px;
      padding: 8px 13px;
      border: 1px solid rgba(239, 68, 68, 0.30);
      border-radius: 999px;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.10);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    h1 {
      max-width: 900px;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      line-height: 0.94;
      font-weight: 950;
      margin-bottom: 22px;
    }
    .lead {
      max-width: 740px;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.2rem);
    }
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      padding: 36px 0 92px;
    }
    .account-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }
    .account-image {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }
    .account-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 74% 58%;
      transform: scale(1.03);
    }
    .badge {
      position: absolute;
      left: 14px;
      bottom: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      color: #bbf7d0;
      background: rgba(5, 7, 18, 0.76);
      font-size: 0.74rem;
      font-weight: 900;
    }
    .account-body { padding: 24px; }
    .account-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }
    h2 { font-size: 1.18rem; line-height: 1.2; }
    .price { color: var(--gold); font-size: 1.25rem; font-weight: 950; white-space: nowrap; }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }
    .meta span, .countdown {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.055);
      font-size: 0.86rem;
      font-weight: 800;
    }
    .countdown { margin-bottom: 18px; color: #fde68a; }
    .btn {
      display: inline-flex;
      width: 100%;
      min-height: 52px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--red), var(--primary-dark));
      font-weight: 900;
    }

    /* Lead Popup Styles */
    .login-popup {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(3, 5, 16, 0.68);
      backdrop-filter: blur(14px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 260ms ease, visibility 260ms ease;
    }
    .login-popup.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .login-popup-card {
      width: min(100%, 420px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 28px;
      background:
        radial-gradient(circle at 16% 0%, rgba(124, 58, 237, 0.28), transparent 18rem),
        rgba(9, 13, 29, 0.94);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
      transform: translateY(18px) scale(0.98);
      transition: transform 260ms ease;
    }
    .login-popup.is-open .login-popup-card {
      transform: translateY(0) scale(1);
    }
    .login-popup-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }
    .login-popup-head h3 {
      font-size: 1.45rem;
      margin-bottom: 6px;
    }
    .login-popup-head p {
      color: var(--muted);
      line-height: 1.55;
    }
    .login-popup-close {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }
    .login-popup-form {
      display: grid;
      gap: 12px;
    }
    .login-popup-form label {
      display: grid;
      gap: 7px;
      color: var(--soft);
      font-size: 0.88rem;
      font-weight: 800;
    }
    .login-popup-form input {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0 16px;
      color: #fff;
      background: rgba(255, 255, 255, 0.07);
      outline: none;
    }
    .login-popup-form input:focus {
      border-color: rgba(124, 58, 237, 0.7);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.16);
    }
    .login-popup-form button {
      min-height: 54px;
      margin-top: 6px;
      border: 0;
      border-radius: 16px;
      color: #171100;
      background: var(--gold);
      font-weight: 900;
      cursor: pointer;
    }
    .login-popup-status {
      min-height: 20px;
      color: #bbf7d0;
      font-size: 0.85rem;
      font-weight: 700;
    }
    @media (max-width: 920px) { .accounts-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px) {
      .container { width: min(100% - 28px, 1180px); }
      .hero { padding: 54px 0 24px; }
      .accounts-grid { grid-template-columns: 1fr; padding-bottom: 64px; }
      .nav-inner { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="monetizehub-dark-premium.html">MONETIZE HUB</a>
      <a class="back-link" href="monetizehub-dark-premium.html#comptes">Retour aux comptes</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="eyebrow">Chaines YouTube disponibles</div>
        <h1>Choisis ta chaine YouTube monetisee.</h1>
        <p class="lead">Chaque chaine est verifiee avant validation : etat de monetisation, acces, niche et conditions de transfert.</p>
      </div>
    </section>

    <section class="container accounts-grid" id="accountsGrid" aria-label="Liste des comptes YouTube">
      <!-- Accounts will be loaded here -->
    </section>
  </main>

  <div class="login-popup" id="loginPopup" aria-hidden="true">
    <div class="login-popup-card" role="dialog" aria-modal="true" aria-labelledby="loginPopupTitle">
      <div class="login-popup-head">
        <div>
          <h3 id="loginPopupTitle">Accès au compte</h3>
          <p>Laissez vos infos pour débloquer le lien de commande sécurisé.</p>
        </div>
        <button class="login-popup-close" id="loginPopupClose" type="button" aria-label="Fermer">×</button>
      </div>
      <form class="login-popup-form" id="loginPopupForm">
        <label>
          Nom
          <input type="text" name="name" placeholder="Votre nom" autocomplete="name" required>
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="votre@email.com" autocomplete="email" required>
        </label>
        <button type="submit">Accéder au paiement</button>
      </form>
      <div class="login-popup-status" id="loginPopupStatus" aria-live="polite"></div>
    </div>
  </div>

  <script>
    async function loadAccounts() {
      const grid = document.getElementById("accountsGrid");
      try {
        const response = await fetch("/api/accounts?platform=youtube");
        const data = await response.json();

        if (!data.ok || data.accounts.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted);">Aucun compte disponible pour le moment.</div>`;
          return;
        }

        grid.innerHTML = data.accounts.map(acc => `
          <article class="account-card">
            <div class="account-image">
              <img src="${acc.image_path}" alt="Aperçu ${acc.name}">
              <span class="badge">${acc.badge}</span>
            </div>
            <div class="account-body">
              <div class="account-top">
                <h2>${acc.name}</h2>
                <div class="price">${acc.price}</div>
              </div>
              <p class="lead">${acc.description}</p>
              <div class="meta">
                ${JSON.parse(acc.meta_items).map(item => `<span>${item}</span>`).join("")}
              </div>
              <div class="countdown">Expire le ${acc.expires_at}</div>
              <button class="btn" onclick="initPurchase('${acc.purchase_link || `https://wa.me/23712345678?text=Bonjour%20Monetize%20Hub%2C%20je%20veux%20commander%20la%20chaine%20${encodeURIComponent(acc.name)}.`}')">Commander</button>
            </div>
          </article>
        `).join("");
      } catch (error) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--red);">Erreur lors du chargement des comptes.</div>`;
      }
    }

    let pendingPurchaseUrl = "";

    function openLoginPopup() {
      const popup = document.getElementById("loginPopup");
      popup.classList.add("is-open");
      popup.setAttribute("aria-hidden", "false");
    }

    function closeLoginPopup() {
      const popup = document.getElementById("loginPopup");
      popup.classList.remove("is-open");
      popup.setAttribute("aria-hidden", "true");
      document.getElementById("loginPopupStatus").textContent = "";
    }

    function initPurchase(url) {
      pendingPurchaseUrl = url;
      openLoginPopup();
    }

    document.getElementById("loginPopupClose").addEventListener("click", closeLoginPopup);

    document.getElementById("loginPopup").addEventListener("click", (e) => {
      if (e.target === document.getElementById("loginPopup")) closeLoginPopup();
    });

    document.getElementById("loginPopupForm").onsubmit = async (e) => {
      e.preventDefault();
      const button = e.target.querySelector("button");
      const status = document.getElementById("loginPopupStatus");
      const formData = new FormData(e.target);

      const payload = {
        name: formData.get("name"),
        email: formData.get("email"),
        source: "account_page",
        page: "youtube-accounts"
      };

      button.disabled = true;
      button.textContent = "Envoi...";

      try {
        const res = await fetch("/api/popup-leads", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (res.ok) {
          status.textContent = "Accès accordé ! Redirection...";
          setTimeout(() => {
            window.location.href = pendingPurchaseUrl;
          }, 1000);
        } else {
          throw new Error(data.error || "Erreur lors de l'envoi.");
        }
      } catch (err) {
        status.textContent = err.message;
        button.disabled = false;
        button.textContent = "Accéder au paiement";
      }
    };

    loadAccounts();
  </script>
</body>
</html>
